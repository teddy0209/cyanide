name: Build Cyanide

on:
  push:
  workflow_dispatch:

jobs:
  build:
    name: Build iOS App
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Public Submodules
        run: |
          git config submodule.Cyanide/tweaks/private.update none
          git submodule update --init --recursive

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Make build script executable
        run: chmod +x ./scripts/build.sh

      - name: Compile Cyanide (Unsigned)
        run: ./scripts/build.sh

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Cyanide-TweakRunner
          path: build/Cyanide.ipa
          retention-days: 7

  release:
    name: Create Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        shell: bash
        run: |
          prev="$(git describe --tags --abbrev=0 HEAD~1 2>/dev/null || true)"
          if [ -z "$prev" ]; then
            log="$(git log --oneline --no-decorate HEAD)"
          else
            log="$(git log --oneline --no-decorate "$prev..HEAD")"
          fi
          delimiter="CHANGELOG_EOF_$(date +%s)"
          echo "body<<$delimiter" >> "$GITHUB_OUTPUT"
          echo "$log" >> "$GITHUB_OUTPUT"
          echo "$delimiter" >> "$GITHUB_OUTPUT"

      - name: Download IPA
        uses: actions/download-artifact@v4
        with:
          name: Cyanide-TweakRunner

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.body }}
          files: Cyanide.ipa
          fail_on_unmatched_files: false
          generate_release_notes: true

  notify:
    name: Notify Discord
    if: always()
    needs: [build, release]
    runs-on: ubuntu-latest
    steps:
      - name: Determine overall status
        id: status
        shell: bash
        run: |
          build="${{ needs.build.result }}"
          release="${{ needs.release.result }}"
          if [ "$build" = "success" ]; then
            if [ "$release" = "success" ]; then
              echo "title=✅ Cyanide build + release succeeded" >> "$GITHUB_OUTPUT"
              echo "color=5763719" >> "$GITHUB_OUTPUT"
            else
              echo "title=✅ Cyanide build succeeded" >> "$GITHUB_OUTPUT"
              echo "color=5763719" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "title=❌ Cyanide build failed" >> "$GITHUB_OUTPUT"
            echo "color=15548997" >> "$GITHUB_OUTPUT"
          fi

      - name: Send Discord notification
        shell: bash
        env:
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
          TITLE: ${{ steps.status.outputs.title }}
          COLOR: ${{ steps.status.outputs.color }}
        run: |
          curl -sS -H "Content-Type: application/json" \
            -X POST \
            -d "$(cat <<-JSON
          {
            "embeds": [{
              "title": "$TITLE",
              "color": $COLOR,
              "fields": [
                {"name": "Commit", "value": "${{ github.sha }}", "inline": true},
                {"name": "Branch", "value": "${{ github.ref_name }}", "inline": true}
              ],
              "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            }]
          }
          JSON
          )" \
            "$WEBHOOK"
